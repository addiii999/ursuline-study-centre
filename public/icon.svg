<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="usc-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ef233c" />
      <stop offset="100%" stop-color="#8b0000" />
    </linearGradient>
  </defs>
  
  <!-- Outer border -->
  <circle cx="256" cy="256" r="248" fill="white" stroke="#c1121f" stroke-width="12" />
  
  <!-- Inner border -->
  <circle cx="256" cy="256" r="230" fill="none" stroke="#c1121f" stroke-width="4" />
  
  <!-- USC Text -->
  <text 
    x="256" 
    y="330" 
    font-family="Georgia, serif" 
    font-weight="900" 
    font-size="220" 
    fill="url(#usc-gradient)" 
    text-anchor="middle"
    letter-spacing="-5"
  >
    USC
  </text>
</svg>
